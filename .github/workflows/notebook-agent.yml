name: Notebook agent

# reusable trigger for the md-notebook flow: builds the notebook from the README.md brief
# via the notebook-agent cloud run job (see data-desk-eco/.github, infra/notebook-agent/).
# callers need permissions: contents+statuses+actions write, and secrets: inherit.
#
# write-back token, in order of preference:
# 1. github app installation token (org var NOTEBOOK_AGENT_APP_ID + org secret
#    NOTEBOOK_AGENT_APP_KEY): scoped to this one repo, expires in an hour â€” the least
#    privilege the agent can hold. fire-and-forget.
# 2. AGENT_GH_TOKEN org secret (fine-grained pat, all org repos): fire-and-forget, but
#    org-wide blast radius if leaked.
# 3. this workflow's own GITHUB_TOKEN: repo-scoped but dies when the workflow ends, so
#    the workflow idles until the job finishes, then dispatches the deploy itself
#    (GITHUB_TOKEN pushes don't trigger workflows).

on:
  workflow_call: {}

jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/create-github-app-token@v2
        id: app
        if: vars.NOTEBOOK_AGENT_APP_ID != ''
        with:
          app-id: ${{ vars.NOTEBOOK_AGENT_APP_ID }}
          private-key: ${{ secrets.NOTEBOOK_AGENT_APP_KEY }}
          # the trigger is fire-and-forget: don't revoke the token when this workflow
          # ends â€” the cloud run job needs it for its push. it expires in an hour anyway.
          skip-token-revoke: true
          permission-contents: write
          permission-statuses: write
          permission-pages: write
          permission-administration: write
      - name: Trigger notebook agent
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          AGENT_TOKEN: ${{ steps.app.outputs.token || secrets.AGENT_GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if grep -qE '^draft: *true' README.md; then echo "draft â€” not building"; exit 0; fi
          # ensure a pages site exists (needs repo admin on the token; harmless otherwise)
          GH_TOKEN="${AGENT_TOKEN:-$GITHUB_TOKEN}" gh api -X POST "repos/$GITHUB_REPOSITORY/pages" -f build_type=workflow 2>/dev/null || true
          printf '%s' "$GCP_SA_KEY" > /tmp/sa.json
          gcloud auth activate-service-account --key-file=/tmp/sa.json --quiet && rm /tmp/sa.json
          ENV="^~^REPO=$GITHUB_REPOSITORY~SHA=$GITHUB_SHA~PUSHER=$GITHUB_ACTOR~CONTEXT_TOKEN=$GH_PAT~GH_TOKEN=${AGENT_TOKEN:-$GITHUB_TOKEN}"
          if [ -n "$AGENT_TOKEN" ]; then
            gcloud run jobs execute notebook-agent --project data-desk-web --region europe-west1 --async --update-env-vars "$ENV"
          else
            gcloud run jobs execute notebook-agent --project data-desk-web --region europe-west1 --wait --update-env-vars "$ENV"
            gh workflow run deploy.yml --ref main -R "$GITHUB_REPOSITORY"
          fi
