name: Notebook Deploy

on:
  workflow_call:
    inputs:
      skip_data:
        description: 'Skip make data step'
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/data-desk-eco/notebook-runner:latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: yarn --frozen-lockfile

      - name: Setup
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          curl -sf -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.raw" \
            https://api.github.com/repos/data-desk-eco/.github/contents/scripts/shared-files.sh | sh

      # Notebooks are public by default. Committing an access.conf opts the repo
      # into Cloudflare Zero Trust gating (see scripts/cf-access.sh).
      - name: Configure Cloudflare Access
        if: hashFiles('access.conf') != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping Access config."
            exit 0
          fi
          bash scripts/cf-access.sh

      - name: Authenticate to Google Cloud
        if: ${{ !inputs.skip_data }}
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "GCP_SA_KEY not set — skipping gcloud auth; notebooks that need provider secrets will fail."
            exit 0
          fi
          printf '%s' "$GCP_SA_KEY" > /tmp/gcp-sa.json
          gcloud auth activate-service-account --key-file=/tmp/gcp-sa.json --quiet
          rm /tmp/gcp-sa.json

      - name: Run make data
        if: ${{ !inputs.skip_data }}
        env:
          GH_TOKEN: ${{ github.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            npm install @anthropic-ai/claude-code
            export PATH="$PWD/node_modules/.bin:$PATH"
          fi
          make data

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com"
          [ -d data ] && git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update data and shared files"
          # The checkout is shallow, so the remote main may have advanced (e.g. a
          # concurrent or scheduled deploy) and a plain push fails non-fast-forward
          # ("fetch first"). Rebase onto the latest main and retry so it fast-forwards.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing onto origin/${GITHUB_REF_NAME:-main} and retrying."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" || exit 1
          done
          echo "Failed to push after rebasing; giving up." >&2
          exit 1

      - run: make build
      - run: "[ -f favicon.ico ] && cp favicon.ico docs/.observable/dist/ || true"

      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.observable/dist
          # per-attempt name: a re-run of a failed run leaves attempt 1's artifact
          # behind, and deploy-pages errors on two artifacts with the same name
          name: github-pages-${{ github.run_attempt }}
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
      # pages deployment creation fails transiently ("deployment failed, try again
      # later"), so do: wait out the flake and retry once
      - if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
